name: Feature request
description: Suggest an enhancement.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should be added or improved?
    validations:
      required: true

  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility impact
      description: Any impact on existing API/config usage?
